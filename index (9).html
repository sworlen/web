<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MEDIA VAULT | TITAN EDITION PRO</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@100;300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root {
            --bg-deep: #02040a; --bg-panel: #0a0c16; --bg-card: #111420;
            --accent: #38bdf8; --accent-glow: rgba(56, 189, 248, 0.4);
            --glass: rgba(255, 255, 255, 0.03); --glass-border: rgba(255, 255, 255, 0.08);
            --glass-heavy: rgba(255, 255, 255, 0.06);
            --text-main: #f8fafc; --text-dim: #64748b;
            --spring: cubic-bezier(0.34, 1.56, 0.64, 1); --smooth: cubic-bezier(0.4, 0, 0.2, 1);
            --c-anime: #f43f5e; --c-star: #fbbf24; --c-fav: #ff4757;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; outline: none; }
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-thumb { background: var(--glass-heavy); border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--accent); }

        body { font-family: 'Outfit', sans-serif; background-color: var(--bg-deep); color: var(--text-main); height: 100vh; display: flex; overflow: hidden; }

        #app-canvas { position: fixed; inset: -100px; z-index: -1; background-size: cover; background-position: center; filter: blur(80px) brightness(0.12) saturate(1.8); transition: background-image 1.5s var(--smooth); transform: scale(1.1); }
        
        /* Sidebar Navigation */
        #sidebar-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 990; backdrop-filter: blur(5px); transition: 0.3s; opacity: 0; }
        #sidebar-overlay.active { display: block; opacity: 1; }

        aside { width: 320px; min-width: 320px; background: var(--bg-panel); border-right: 1px solid var(--glass-border); display: flex; flex-direction: column; padding: 50px 0 20px; z-index: 1000; transition: left 0.4s var(--smooth); }
        .brand { padding: 0 45px 50px; display: flex; align-items: center; gap: 15px; }
        .brand-logo { width: 45px; height: 45px; background: linear-gradient(135deg, var(--accent), #818cf8); border-radius: 14px; display: flex; align-items: center; justify-content: center; font-size: 1.5rem; color: black; }
        .brand-name { font-size: 1.8rem; font-weight: 900; letter-spacing: -2px; }

        .nav-group { padding: 0 25px; flex: 1; overflow-y: auto; }
        .nav-label { font-size: 0.75rem; font-weight: 800; color: #475569; text-transform: uppercase; letter-spacing: 2.5px; margin: 35px 0 15px 20px; display: flex; justify-content: space-between; align-items: center; }
        .nav-link { padding: 14px 20px; border-radius: 18px; color: var(--text-dim); cursor: pointer; display: flex; align-items: center; gap: 15px; transition: 0.3s; margin-bottom: 5px; font-weight: 600; position: relative; }
        .nav-link:hover, .nav-link.active { background: var(--glass-heavy); color: white; }
        .delete-playlist { position: absolute; right: 15px; opacity: 0; transition: 0.3s; padding: 10px; }
        .nav-link:hover .delete-playlist { opacity: 1; }

        /* User Identity Widget */
        .user-identity { padding: 20px 25px; margin: 20px 25px 0; background: var(--glass); border: 1px solid var(--glass-border); border-radius: 22px; display: flex; align-items: center; gap: 12px; }
        .user-avatar { width: 35px; height: 35px; border-radius: 50%; background: var(--accent); color: black; display: flex; align-items: center; justify-content: center; font-weight: 900; font-size: 0.9rem; flex-shrink: 0; }
        .user-info { overflow: hidden; }
        .user-email { font-size: 0.8rem; font-weight: 700; color: white; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .user-status { font-size: 0.65rem; color: var(--accent); font-weight: 800; text-transform: uppercase; letter-spacing: 1px; }

        /* Main Area & Header */
        main { flex: 1; position: relative; overflow-y: auto; z-index: 10; scroll-behavior: smooth; }
        .header-sticky { position: sticky; top: 0; z-index: 900; padding: 25px 60px; background: rgba(2, 4, 8, 0.85); backdrop-filter: blur(20px); border-bottom: 1px solid var(--glass-border); display: flex; gap: 20px; align-items: center; }
        
        #mobile-menu-btn { display: none; background: none; border: none; color: white; font-size: 1.5rem; cursor: pointer; padding: 10px; }
        #mobile-user-badge { display: none; }

        .search-wrapper { position: relative; flex: 1; max-width: 600px; }
        .search-input { width: 100%; background: rgba(255,255,255,0.05); border: 2px solid var(--glass-border); padding: 16px 25px 16px 60px; border-radius: 18px; color: white; font-size: 1rem; transition: 0.4s; }
        .search-input:focus { border-color: var(--accent); background: #000; box-shadow: 0 0 30px var(--accent-glow); }

        #search-results { position: absolute; top: calc(100% + 10px); left: 0; right: 0; background: var(--bg-card); border: 1px solid var(--glass-border); border-radius: 20px; max-height: 400px; overflow-y: auto; display: none; z-index: 2000; box-shadow: 0 20px 40px rgba(0,0,0,0.5); }
        .search-item { padding: 12px 20px; display: flex; align-items: center; gap: 15px; cursor: pointer; transition: 0.2s; }
        .search-item:hover { background: var(--glass-heavy); }
        .search-item img { width: 40px; height: 55px; border-radius: 8px; object-fit: cover; }

        .viewport-content { padding: 60px; }
        .media-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 35px; }

        .media-card { position: relative; border-radius: 25px; cursor: pointer; transition: 0.5s var(--spring); }
        .media-card:hover { transform: translateY(-10px) scale(1.02); }

        .card-actions { position: absolute; top: 15px; right: 15px; z-index: 50; display: flex; flex-direction: column; gap: 8px; opacity: 0; transition: 0.3s var(--smooth); }
        .media-card:hover .card-actions { opacity: 1; }
        .action-btn { width: 38px; height: 38px; border-radius: 12px; background: rgba(0,0,0,0.8); border: 1px solid var(--glass-border); color: white; display: flex; align-items: center; justify-content: center; backdrop-filter: blur(10px); transition: 0.2s; border: none; cursor: pointer; }
        .action-btn:hover { transform: scale(1.1); border-color: var(--accent); border: 1px solid var(--accent); }
        .action-btn.fav-active { color: var(--c-fav); }

        .card-ratings-wrapper { position: absolute; top: 15px; left: 15px; z-index: 50; display: flex; flex-direction: column; gap: 5px; }
        .rating-tag { background: rgba(0,0,0,0.8); padding: 5px 10px; border-radius: 10px; font-family: 'JetBrains Mono'; font-size: 0.7rem; font-weight: 800; border: 1px solid var(--glass-border); display: flex; align-items: center; gap: 6px; backdrop-filter: blur(5px); }
        .tag-tmdb { color: var(--c-star); }
        .tag-user { color: var(--accent); border-color: var(--accent-glow); }

        .progress-container { position: absolute; bottom: 0; left: 0; width: 100%; height: 6px; background: rgba(255,255,255,0.1); overflow: hidden; }
        .progress-bar { height: 100%; background: var(--accent); box-shadow: 0 0 10px var(--accent); transition: width 0.6s var(--smooth); }
        .progress-text { position: absolute; bottom: 10px; right: 15px; font-family: 'JetBrains Mono'; font-size: 0.65rem; font-weight: 900; color: var(--accent); text-shadow: 0 0 10px black; }

        .poster-wrapper { position: relative; width: 100%; aspect-ratio: 2/3; border-radius: 22px; overflow: hidden; border: 1px solid var(--glass-border); }
        .poster-wrapper img { width: 100%; height: 100%; object-fit: cover; }
        .card-overlay { position: absolute; inset: 0; background: linear-gradient(to top, rgba(0,0,0,0.9) 0%, transparent 60%); display: flex; flex-direction: column; justify-content: flex-end; padding: 20px; padding-bottom: 25px; }

        /* Modals */
        #modal-engine, #playlist-picker { position: fixed; inset: 0; z-index: 10000; background: rgba(0,0,0,0.9); backdrop-filter: blur(30px); display: none; align-items: center; justify-content: center; padding: 30px; }
        .modal-surface { width: 100%; max-width: 1300px; height: 85vh; background: var(--bg-panel); border-radius: 40px; border: 1px solid var(--glass-border); display: flex; overflow: hidden; position: relative; }
        
        .modal-close-btn { position: absolute; top: 25px; right: 25px; z-index: 10001; background: rgba(0,0,0,0.5); backdrop-filter: blur(10px); border: 1px solid var(--glass-border); color: white; width: 45px; height: 45px; border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; font-size: 1.2rem; transition: 0.3s; }
        .modal-close-btn:hover { background: var(--accent); color: black; transform: scale(1.1); }

        .modal-hero { width: 40%; background-size: cover; background-position: center; position: relative; }
        .modal-scrollable { width: 60%; padding: 60px; overflow-y: auto; }

        #playlist-picker { z-index: 20000; background: rgba(0,0,0,0.85); }
        .picker-surface { background: var(--bg-card); width: 100%; max-width: 420px; border-radius: 35px; border: 1px solid var(--glass-border); padding: 35px; box-shadow: 0 25px 80px rgba(0,0,0,0.8); position: relative; }
        .picker-list { margin: 25px 0; max-height: 280px; overflow-y: auto; display: flex; flex-direction: column; gap: 12px; }
        .picker-item { padding: 16px 20px; background: var(--glass); border-radius: 18px; cursor: pointer; transition: 0.3s; border: 1px solid transparent; display: flex; justify-content: space-between; align-items: center; font-weight: 600; }
        .picker-item:hover { background: var(--glass-heavy); border-color: var(--accent); }
        .picker-item.already-in { opacity: 0.4; cursor: not-allowed; filter: grayscale(1); }
        .new-playlist-group { display: flex; gap: 12px; margin-top: 25px; padding-top: 25px; border-top: 1px solid var(--glass-border); }

        .season-accordion { margin-bottom: 15px; border-radius: 20px; overflow: hidden; background: var(--glass); border: 1px solid var(--glass-border); }
        .season-header { padding: 20px 25px; cursor: pointer; display: flex; justify-content: space-between; align-items: center; }
        .season-content { max-height: 0; overflow: hidden; transition: max-height 0.4s var(--smooth); padding: 0 25px; }
        .season-accordion.open .season-content { padding-bottom: 25px; }
        
        .ep-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(50px, 1fr)); gap: 10px; margin-top: 15px; }
        .ep-box { aspect-ratio: 1; background: var(--glass-heavy); border-radius: 10px; display: flex; align-items: center; justify-content: center; font-weight: 800; cursor: pointer; transition: 0.2s; border: 1px solid transparent; }
        .ep-box.watched { background: var(--accent); color: black; box-shadow: 0 0 15px var(--accent-glow); }

        .star-container { display: flex; gap: 5px; margin: 15px 0; }
        .star { font-size: 1.5rem; color: rgba(255,255,255,0.1); cursor: pointer; transition: 0.2s; }
        .star.active, .star.hover { color: var(--c-star); text-shadow: 0 0 15px var(--c-star); }

        #auth-overlay { position: fixed; inset: 0; z-index: 100000; background: var(--bg-deep); display: flex; align-items: center; justify-content: center; padding: 20px; }
        .auth-card { background: var(--bg-panel); padding: 50px; border-radius: 35px; width: 100%; max-width: 400px; text-align: center; border: 1px solid var(--glass-border); }
        
        .pagination { display: flex; justify-content: center; align-items: center; gap: 20px; padding: 40px 0; }
        .page-btn { padding: 12px 25px; border-radius: 15px; background: var(--glass); border: 1px solid var(--glass-border); color: white; cursor: pointer; font-weight: 700; transition: 0.3s; }
        .page-btn:hover:not(:disabled) { background: var(--accent); color: black; }

        /* ================= MOBILE RESPONSIVE LAYOUT ================= */
        @media (max-width: 900px) {
            aside { position: fixed; left: -320px; top: 0; bottom: 0; box-shadow: 20px 0 50px rgba(0,0,0,0.5); }
            aside.open { left: 0; }
            
            #mobile-menu-btn { display: block; }
            #mobile-user-badge { display: flex; width: 38px; height: 38px; border-radius: 12px; background: var(--accent); color: black; align-items: center; justify-content: center; font-weight: 900; font-size: 0.8rem; flex-shrink: 0; }

            .header-sticky { padding: 15px 20px; gap: 12px; }
            .search-input { padding: 14px 20px 14px 45px; font-size: 0.9rem; }
            .search-wrapper i { left: 15px; }
            #stats-counter { display: none; }

            .viewport-content { padding: 25px 20px; }
            #view-title { font-size: 2.2rem; margin-bottom: 25px; }
            .media-grid { grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 15px; }
            
            .card-actions { opacity: 1; transform: scale(0.85); top: 5px; right: 5px; transform-origin: top right; }
            .card-ratings-wrapper { transform: scale(0.85); top: 5px; left: 5px; transform-origin: top left; }

            #modal-engine { padding: 0; }
            .modal-surface { flex-direction: column; height: 100vh; border-radius: 0; border: none; }
            .modal-close-btn { top: 15px; right: 15px; background: rgba(0,0,0,0.8); }
            
            .modal-hero { width: 100%; height: 65% ; flex-shrink 0;}
            .modal-scrollable { width: 100%; height: 100%; padding: 30px 20px; }
            #m-title { font-size: 2.2rem; }
            
            #playlist-picker { padding: 15px; }
            .picker-surface { padding: 25px; border-radius: 25px; }

            .auth-card { padding: 35px 25px; }
            .user-identity { margin: 10px 15px; padding: 15px; }
        }
    </style>
</head>
<body>

<div id="auth-overlay">
    <div class="auth-card">
        <div class="brand-logo" style="margin: 0 auto 30px;">M</div>
        <h2 id="auth-title" style="margin-bottom: 25px;">Přihlášení</h2>
        <input type="email" id="auth-email" class="search-input" style="padding-left:20px; margin-bottom:15px" placeholder="Email">
        <input type="password" id="auth-pass" class="search-input" style="padding-left:20px; margin-bottom:15px" placeholder="Heslo">
        <button onclick="Core.handleAuth()" style="width: 100%; padding: 15px; border-radius: 15px; border: none; background: var(--accent); color: black; font-weight: 800; cursor: pointer;">VSTOUPIT</button>
        <p style="margin-top:20px; font-size:0.9rem; color: var(--text-dim);">Změnit režim? <span onclick="Core.toggleAuthMode()" id="auth-switch" style="color: var(--accent); cursor: pointer;">Registrovat</span></p>
    </div>
</div>

<div id="app-canvas"></div>

<div id="sidebar-overlay" onclick="Core.toggleSidebar(false)"></div>

<aside id="main-sidebar">
    <div class="brand">
        <div class="brand-logo"><i class="fa-solid fa-vault"></i></div>
        <div class="brand-name">MEDIA<span>VAULT</span></div>
    </div>
    <div class="nav-group">
        <div class="nav-label">Knihovna</div>
        <div class="nav-link active" data-view="all" onclick="Core.navigate('all', this)"><i class="fa-solid fa-house"></i> Vše</div>
        <div class="nav-link" data-view="Movie" onclick="Core.navigate('Movie', this)"><i class="fa-solid fa-film"></i> Filmy</div>
        <div class="nav-link" data-view="Serials" onclick="Core.navigate('Serials', this)"><i class="fa-solid fa-tv"></i> Seriály</div>
        <div class="nav-link" data-view="Anime" onclick="Core.navigate('Anime', this)"><i class="fa-solid fa-ghost"></i> Anime</div>
        <div class="nav-link" data-view="favorites" onclick="Core.navigate('favorites', this)"><i class="fa-solid fa-heart" style="color:var(--c-fav)"></i> Oblíbené</div>
        
        <div class="nav-label">Moje Seznamy <i class="fa-solid fa-plus" style="cursor:pointer" onclick="Core.addPlaylistPrompt()"></i></div>
        <div id="sidebar-playlists"></div>
        
        <div class="nav-label">Systém</div>
        <div class="nav-link" onclick="Core.logout()" style="color: #ff4757;"><i class="fa-solid fa-power-off"></i> Odhlásit</div>
    </div>

    <div class="user-identity">
        <div class="user-avatar" id="pc-user-initials">?</div>
        <div class="user-info">
            <div class="user-email" id="pc-user-email">Načítání...</div>
            <div class="user-status">Aktivní profil</div>
        </div>
    </div>
</aside>

<main id="scroller">
    <header class="header-sticky">
        <button id="mobile-menu-btn" onclick="Core.toggleSidebar(true)">
            <i class="fa-solid fa-bars"></i>
        </button>
        <div class="search-wrapper">
            <i class="fa-solid fa-search" style="position: absolute; left: 25px; top: 50%; transform: translateY(-50%); color: var(--text-dim);"></i>
            <input type="text" id="global-search" class="search-input" placeholder="Hledat..." 
                   oninput="Core.handleSearch(this.value)" onfocus="Core.handleSearch(this.value)" onblur="setTimeout(() => document.getElementById('search-results').style.display='none', 200)">
            <div id="search-results"></div>
        </div>
        <div id="mobile-user-badge">?</div>
        <div id="stats-counter" style="font-family: 'JetBrains Mono'; color: var(--accent); font-size: 0.8rem; white-space: nowrap;">0 TITULŮ</div>
    </header>

    <div class="viewport-content">
        <h2 id="view-title" style="font-size: 3rem; font-weight: 900; margin-bottom: 40px; letter-spacing: -2px;">Všechno</h2>
        <div class="media-grid" id="main-grid"></div>
        <div class="pagination">
            <button class="page-btn" id="prev-btn" onclick="Core.changePage(-1)">Zpět</button>
            <div id="page-info" style="font-family: 'JetBrains Mono'; color: var(--accent);">1 / 1</div>
            <button class="page-btn" id="next-btn" onclick="Core.changePage(1)">Další</button>
        </div>
    </div>
</main>

<div id="modal-engine" onclick="Core.closeModal()">
    <div class="modal-surface" onclick="event.stopPropagation()">
        <button class="modal-close-btn" onclick="Core.closeModal()">
            <i class="fa-solid fa-xmark"></i>
        </button>
        <div class="modal-hero" id="m-hero">
            <div class="progress-container" style="height: 10px; bottom: 0;">
                <div class="progress-bar" id="m-progress-bar" style="width: 0%"></div>
            </div>
            <div class="progress-text" id="m-progress-text" style="bottom: 20px; font-size: 1.2rem;">0%</div>
        </div>
        <div class="modal-scrollable">
            <div id="m-cat" style="color: var(--accent); font-weight: 800; letter-spacing: 3px; font-size: 0.7rem; text-transform: uppercase;"></div>
            <h1 id="m-title" style="font-size: 3.5rem; font-weight: 900; margin: 10px 0 20px; line-height: 1;"></h1>
            <div class="nav-label" style="margin-left:0">Tvoje hodnocení</div>
            <div class="star-container" id="m-stars"></div>
            <p id="m-desc" style="color: #94a3b8; line-height: 1.6; margin-bottom: 30px;"></p>
            <div id="m-content-root"></div>
        </div>
    </div>
</div>

<div id="playlist-picker" onclick="Core.closePicker()">
    <div class="picker-surface" onclick="event.stopPropagation()">
        <button class="modal-close-btn" style="top: 15px; right: 15px; width: 35px; height: 35px; font-size: 1rem;" onclick="Core.closePicker()">
            <i class="fa-solid fa-xmark"></i>
        </button>
        <h3 style="font-weight: 900; font-size: 1.8rem; letter-spacing: -1px; padding-right: 30px;">Uložit do seznamu</h3>
        <p style="color: var(--text-dim); margin-top: 5px; font-size: 0.9rem;">Vyberte kam titul zařadit</p>
        <div class="picker-list" id="picker-list-content"></div>
        <div class="new-playlist-group">
            <input type="text" id="picker-new-name" class="search-input" style="padding-left: 20px; height: 50px;" placeholder="Nový seznam...">
            <button class="action-btn" style="width: 50px; height: 50px; flex-shrink: 0; background: var(--accent); color: black;" onclick="Core.createPlaylistFromPicker()">
                <i class="fa-solid fa-plus"></i>
            </button>
        </div>
    </div>
</div>

<script src="data.js"></script>
<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getAuth, onAuthStateChanged, signInWithEmailAndPassword, createUserWithEmailAndPassword, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
    import { getFirestore, doc, setDoc, getDoc, collection, onSnapshot } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyCKDEC_0krG_OqfBuqd6vV2L2ixWDrWMZM",
        authDomain: "media-tracker-51c0b.firebaseapp.com",
        projectId: "media-tracker-51c0b",
        storageBucket: "media-tracker-51c0b.firebasestorage.app",
        messagingSenderId: "495677485176",
        appId: "1:495677485176:web:72665e4fca98e2e740bd8d"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    window.FB = { auth, db, doc, setDoc, getDoc, signInWithEmailAndPassword, createUserWithEmailAndPassword, signOut };

    onAuthStateChanged(auth, async (user) => {
        if (user) {
            // Update User Badge UI
            const email = user.email || "Uživatel";
            const initial = email.charAt(0).toUpperCase();
            document.getElementById('pc-user-email').innerText = email;
            document.getElementById('pc-user-initials').innerText = initial;
            document.getElementById('mobile-user-badge').innerText = initial;

            const snap = await getDoc(doc(db, "users", user.uid));
            if (snap.exists()) {
                const data = snap.data();
                Core.state.db = { 
                    fav: data.fav || [], 
                    episodes: data.episodes || [], 
                    ratings: data.ratings || {}, 
                    playlists: data.playlists || {} 
                };
            }
            document.getElementById('auth-overlay').style.display = 'none';
            onSnapshot(collection(db, "global_ratings"), (snapshot) => {
                let ratingsData = {};
                snapshot.forEach(doc => { ratingsData[doc.id] = doc.data(); });
                Core.state.globalRatings = ratingsData;
                Core.renderGrid();
            });
            Core.init();
        } else {
            document.getElementById('auth-overlay').style.display = 'flex';
        }
    });
</script>

<script>
    window.Core = {
        state: {
            db: { fav: [], episodes: [], ratings: {}, playlists: {} },
            globalRatings: {}, 
            view: 'all', query: '', page: 1, perPage: 20, activeItem: null,
            searchTimeout: null, pendingMediaId: null
        },

        async init() { this.syncPlaylists(); this.renderGrid(); },

        toggleSidebar(f) {
            const s = document.getElementById('main-sidebar'), o = document.getElementById('sidebar-overlay');
            const open = f !== undefined ? f : !s.classList.contains('open');
            if (open) { s.classList.add('open'); o.classList.add('active'); } 
            else { s.classList.remove('open'); o.classList.remove('active'); }
        },

        async save() {
            if (FB.auth.currentUser) {
                try { await FB.setDoc(FB.doc(FB.db, "users", FB.auth.currentUser.uid), this.state.db); } 
                catch(e) { console.error("Save failed:", e); }
            }
        },

        handleAuth() {
            const email = document.getElementById('auth-email').value, pass = document.getElementById('auth-pass').value;
            const isReg = document.getElementById('auth-title').innerText === 'Registrace';
            if(isReg) FB.createUserWithEmailAndPassword(FB.auth, email, pass).then(r => FB.setDoc(FB.doc(FB.db, "users", r.user.uid), this.state.db)).catch(e => alert(e.message));
            else FB.signInWithEmailAndPassword(FB.auth, email, pass).catch(e => alert(e.message));
        },

        toggleAuthMode() {
            const t = document.getElementById('auth-title'), s = document.getElementById('auth-switch');
            const isReg = t.innerText === 'Registrace';
            t.innerText = isReg ? 'Přihlášení' : 'Registrace';
            s.innerText = isReg ? 'Registrovat' : 'Přihlášení';
        },

        logout() { FB.signOut(FB.auth).then(() => location.reload()); },

        navigate(view, el) {
            this.state.view = view; this.state.page = 1;
            document.querySelectorAll('.nav-link').forEach(n => n.classList.remove('active'));
            if(el) el.classList.add('active');
            let label = view === 'all' ? 'Všechno' : (view === 'favorites' ? 'Oblíbené' : (this.state.db.playlists[view] ? `Seznam: ${view}` : view));
            document.getElementById('view-title').innerText = label;
            this.renderGrid();
            if (window.innerWidth <= 900) this.toggleSidebar(false);
        },

        handleSearch(v) {
            this.state.query = v;
            const dropdown = document.getElementById('search-results');
            if(v.length > 1) {
                const matches = mediaData.filter(m => m.title.toLowerCase().includes(v.toLowerCase())).slice(0, 5);
                if(matches.length > 0) {
                    dropdown.style.display = 'block';
                    dropdown.innerHTML = matches.map(m => `
                        <div class="search-item" onclick="Core.openModal('${m.id}')">
                            <img src="${m.image}">
                            <div>
                                <div style="font-weight:700; font-size:0.9rem">${m.title}</div>
                                <div style="font-size:0.7rem; color:var(--accent)">${m.cat} • ${m.year}</div>
                            </div>
                        </div>`).join('');
                } else dropdown.style.display = 'none';
            } else dropdown.style.display = 'none';
            clearTimeout(this.state.searchTimeout);
            this.state.searchTimeout = setTimeout(() => { this.state.page = 1; this.renderGrid(); }, 300);
        },

        changePage(o) { this.state.page += o; this.renderGrid(); document.getElementById('scroller').scrollTo(0,0); },

        toggleFavorite(e, id) {
            e.stopPropagation();
            const idx = this.state.db.fav.indexOf(id.toString());
            if(idx > -1) this.state.db.fav.splice(idx, 1);
            else this.state.db.fav.push(id.toString());
            this.save(); this.renderGrid();
        },

        openPlaylistPicker(e, id) {
            e.stopPropagation();
            this.state.pendingMediaId = id.toString();
            const picker = document.getElementById('playlist-picker'), list = document.getElementById('picker-list-content');
            const playlists = Object.keys(this.state.db.playlists);
            if (playlists.length === 0) {
                list.innerHTML = `<div style="text-align:center; color:var(--text-dim); padding:20px;">Žádné seznamy.</div>`;
            } else {
                list.innerHTML = playlists.map(p => {
                    const isAlreadyIn = this.state.db.playlists[p].includes(id.toString());
                    return `
                        <div class="picker-item ${isAlreadyIn ? 'already-in' : ''}" onclick="${isAlreadyIn ? '' : `Core.confirmAddToPlaylist('${p}')`}">
                            <span><i class="fa-solid fa-list-ul" style="margin-right:12px; color:var(--accent)"></i> ${p}</span>
                            ${isAlreadyIn ? '<i class="fa-solid fa-check" style="color:var(--accent)"></i>' : ''}
                        </div>`;
                }).join('');
            }
            picker.style.display = 'flex';
        },

        async confirmAddToPlaylist(name) {
            const id = this.state.pendingMediaId;
            if (!this.state.db.playlists[name].includes(id)) {
                this.state.db.playlists[name].push(id);
                await this.save(); this.closePicker(); this.renderGrid();
            }
        },

        async createPlaylistFromPicker() {
            const input = document.getElementById('picker-new-name'), name = input.value.trim();
            if (name && !this.state.db.playlists[name]) {
                this.state.db.playlists[name] = [];
                await this.save(); this.syncPlaylists();
                if (this.state.pendingMediaId) await this.confirmAddToPlaylist(name);
                input.value = '';
            }
        },

        closePicker() { document.getElementById('playlist-picker').style.display = 'none'; this.state.pendingMediaId = null; },

        addPlaylistPrompt() {
            const n = prompt("Název nového seznamu:");
            if(n && !this.state.db.playlists[n]) { this.state.db.playlists[n] = []; this.save(); this.syncPlaylists(); }
        },

        calculateProgress(item) {
            if(!item) return 0;
            if(item.cat === 'Movie') return this.state.db.episodes.includes(`m-${item.id}`) ? 100 : 0;
            const total = (item.seasons || []).reduce((acc, s) => acc + (s.ep_count || 0), 0);
            if(total === 0) return 0;
            const watched = this.state.db.episodes.filter(uid => uid.startsWith(`${item.id}_`)).length;
            return Math.round((watched / total) * 100);
        },

        renderGrid() {
            const grid = document.getElementById('main-grid');
            const items = mediaData.filter(i => {
                const m = i.title.toLowerCase().includes(this.state.query.toLowerCase());
                if (this.state.view === 'all') return m;
                if (this.state.view === 'favorites') return m && this.state.db.fav.includes(i.id.toString());
                if (this.state.db.playlists[this.state.view]) return m && this.state.db.playlists[this.state.view].includes(i.id.toString());
                return m && i.cat === this.state.view;
            });
            const totalPages = Math.ceil(items.length / this.state.perPage) || 1;
            const slice = items.slice((this.state.page - 1) * this.state.perPage, this.state.page * this.state.perPage);
            document.getElementById('page-info').innerText = `${this.state.page} / ${totalPages}`;
            document.getElementById('prev-btn').disabled = this.state.page === 1;
            document.getElementById('next-btn').disabled = this.state.page === totalPages;
            if(document.getElementById('stats-counter')) document.getElementById('stats-counter').innerText = `${items.length} TITULŮ`;
            grid.innerHTML = slice.map(item => {
                const userRating = this.state.db.ratings[item.id] || 0, isFav = this.state.db.fav.includes(item.id.toString());
                const stats = this.state.globalRatings[item.id.toString()], avg = stats && stats.count > 0 ? (stats.sum / stats.count).toFixed(1) : "0.0";
                const progress = this.calculateProgress(item);
                return `
                <div class="media-card" onclick="Core.openModal('${item.id}')" onmouseenter="if(window.innerWidth > 900) document.getElementById('app-canvas').style.backgroundImage='url(${item.image})'">
                    <div class="card-actions">
                        <button class="action-btn ${isFav?'fav-active':''}" onclick="Core.toggleFavorite(event, '${item.id}')"><i class="fa-${isFav?'solid':'regular'} fa-heart"></i></button>
                        <button class="action-btn" onclick="Core.openPlaylistPicker(event, '${item.id}')"><i class="fa-solid fa-plus"></i></button>
                    </div>
                    <div class="card-ratings-wrapper">
                        <div class="rating-tag tag-tmdb"><i class="fa-solid fa-star"></i> ${item.rating || 'N/A'}</div>
                        <div class="rating-tag tag-user"><i class="fa-solid fa-users"></i> ${avg}</div>
                    </div>
                    <div class="poster-wrapper">
                        <img src="${item.image}" loading="lazy">
                        <div class="progress-text">${progress}%</div>
                        <div class="card-overlay">
                            <div style="font-size:0.65rem; font-weight:800; color:var(--accent)">${item.cat}</div>
                            <div style="font-weight:700; font-size:0.95rem">${item.title}</div>
                            <div class="user-rating-mini">
                                ${Array.from({length: 5}, (_, i) => `<i class="fa-solid fa-star" style="opacity:${userRating > 0 && (i*2) < userRating ? 1 : 0.1}"></i>`).join('')}
                            </div>
                        </div>
                        <div class="progress-container"><div class="progress-bar" style="width: ${progress}%"></div></div>
                    </div>
                </div>`;
            }).join('');
        },

        openModal(id) {
            const item = mediaData.find(x => x.id == id); this.state.activeItem = item;
            document.getElementById('m-hero').style.backgroundImage = `url(${item.image})`;
            document.getElementById('m-title').innerText = item.title;
            document.getElementById('m-desc').innerText = item.overview || 'Bez popisu.';
            document.getElementById('m-cat').innerText = `${item.cat} • ${item.year || '?'}`;
            this.updateModalProgress(); this.renderStars(id); this.renderContent(item);
            document.getElementById('modal-engine').style.display = 'flex';
        },

        updateModalProgress() {
            const p = this.calculateProgress(this.state.activeItem);
            document.getElementById('m-progress-bar').style.width = `${p}%`;
            document.getElementById('m-progress-text').innerText = `${p}%`;
        },

        renderStars(id) {
            const r = this.state.db.ratings[id] || 0, container = document.getElementById('m-stars');
            container.innerHTML = Array.from({length:10}, (_, i) => `
                <i class="fa-solid fa-star star ${i < r ? 'active' : ''}" 
                   onclick="Core.rate('${id}', ${i+1})" 
                   onmouseenter="Core.starHover(this, ${i+1})" 
                   onmouseleave="Core.renderStars('${id}')"></i>`).join('');
        },

        starHover(el, v) {
            if(!el) return;
            el.parentElement.querySelectorAll('.star').forEach((s, i) => s.classList.toggle('hover', i < v));
        },

        async rate(id, v) { 
            const old = this.state.db.ratings[id] || 0; this.state.db.ratings[id] = v; await this.save(); 
            const statsRef = FB.doc(FB.db, "global_ratings", id.toString()), snap = await FB.getDoc(statsRef);
            let data = snap.exists() ? snap.data() : { sum: 0, count: 0 };
            if(old > 0) data.sum = (data.sum - old) + v; else { data.sum += v; data.count += 1; }
            await FB.setDoc(statsRef, data); this.renderStars(id);
        },

        toggleAccordion(el) {
            const acc = el.parentElement, content = acc.querySelector('.season-content');
            document.querySelectorAll('.season-accordion').forEach(a => {
                if(a !== acc) { a.classList.remove('open'); a.querySelector('.season-content').style.maxHeight = "0"; }
            });
            acc.classList.toggle('open');
            content.style.maxHeight = acc.classList.contains('open') ? content.scrollHeight + "px" : "0";
        },

        renderContent(item) {
            const root = document.getElementById('m-content-root');
            if(item.cat === 'Movie') {
                const uid = `m-${item.id}`, isW = this.state.db.episodes.includes(uid);
                root.innerHTML = `<button class="page-btn" style="width:100%" onclick="Core.toggleEp('${uid}', this)">${isW?'ZHLÉDNUTO ✓':'OZNAČIT JAKO VIDĚNÉ'}</button>`;
            } else {
                root.innerHTML = (item.seasons || []).map((s, sIdx) => {
                    const sNum = s.n || sIdx+1;
                    return `
                    <div class="season-accordion" id="acc-s${sNum}">
                        <div class="season-header" onclick="Core.toggleAccordion(this)">
                            <span style="font-weight:800; font-size:1.2rem">${s.name}</span><i class="fa-solid fa-chevron-down"></i>
                        </div>
                        <div class="season-content"><div class="ep-grid">
                            ${Array.from({length: s.ep_count}, (_, i) => {
                                const uid = `${item.id}_s${sNum}_e${i+1}`, isW = this.state.db.episodes.includes(uid);
                                return `<div class="ep-box ${isW?'watched':''}" data-uid="${uid}" onclick="Core.toggleEp('${uid}', this)">${i+1}</div>`;
                            }).join('')}
                        </div></div>
                    </div>`}).join('');
            }
        },

        toggleEp(uid, el) {
            const idx = this.state.db.episodes.indexOf(uid);
            if(idx > -1) this.state.db.episodes.splice(idx, 1); else this.state.db.episodes.push(uid);
            this.save(); this.updateModalProgress(); this.renderGrid();
            if(el.tagName === 'BUTTON') el.innerText = this.state.db.episodes.includes(uid) ? 'ZHLÉDNUTO ✓' : 'OZNAČIT JAKO VIDĚNÉ';
            else el.classList.toggle('watched');
        },

        deletePlaylist(e, n) {
            e.stopPropagation();
            if(confirm(`Smazat playlist "${n}"?`)) { 
                delete this.state.db.playlists[n]; if(this.state.view === n) this.state.view = 'all'; 
                this.save(); this.syncPlaylists(); this.renderGrid(); 
            }
        },

        syncPlaylists() {
            document.getElementById('sidebar-playlists').innerHTML = Object.keys(this.state.db.playlists).map(p => `
                <div class="nav-link ${this.state.view===p?'active':''}" data-view="${p}" onclick="Core.navigate('${p}', this)">
                    <i class="fa-solid fa-list-ul"></i> ${p}
                    <i class="fa-solid fa-trash-can delete-playlist" onclick="Core.deletePlaylist(event, '${p}')"></i>
                </div>`).join('');
        },

        closeModal() { document.getElementById('modal-engine').style.display = 'none'; }
    };
</script>
</body>
</html>
